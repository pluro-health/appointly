services:
 # PostgreSQL Database
 postgres:
   image: postgres:15-alpine
   container_name: calcom_postgres_prod
   restart: unless-stopped
   environment:
     POSTGRES_DB: calcom
     POSTGRES_USER: calcom
     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-calcom_password}
     POSTGRES_HOST_AUTH_METHOD: trust
   ports:
     - "5432:5432"
   volumes:
     - postgres_data_prod:/var/lib/postgresql/data
     - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
   healthcheck:
     test: ["CMD-SHELL", "pg_isready -U calcom -d calcom"]
     interval: 10s
     timeout: 5s
     retries: 5
   networks:
     - calcom_network


 # Redis for caching and queues
 redis:
   image: redis:7-alpine
   container_name: calcom_redis_prod
   restart: unless-stopped
   ports:
     - "6379:6379"
   volumes:
     - redis_data_prod:/data
   command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
   healthcheck:
     test: ["CMD", "redis-cli", "ping"]
     interval: 10s
     timeout: 5s
     retries: 5
   networks:
     - calcom_network


 # API v2 (NestJS) - Running on port 5555 as per your build command
 api-v2:
   build:
     context: .
     dockerfile: apps/api/v2/Dockerfile
     args:
       DATABASE_URL: postgresql://calcom:${POSTGRES_PASSWORD:-calcom_password}@postgres:5432/calcom
       DATABASE_DIRECT_URL: postgresql://calcom:${POSTGRES_PASSWORD:-calcom_password}@postgres:5432/calcom
   image: appointly/api-v2:latest
   container_name: calcom_api_v2_prod
   restart: unless-stopped
   environment:
     - NODE_ENV=production
     - DATABASE_URL=postgresql://calcom:${POSTGRES_PASSWORD:-calcom_password}@postgres:5432/calcom
     - DATABASE_DIRECT_URL=postgresql://calcom:${POSTGRES_PASSWORD:-calcom_password}@postgres:5432/calcom
     - REDIS_URL=redis://redis:6379
     - PORT=80
     - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-your-secret-key-here}
     - WEB_APP_URL=${NEXT_PUBLIC_WEBAPP_URL:-http://localhost:3000}
     - STRIPE_API_KEY=${STRIPE_PRIVATE_KEY:-}
     - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
     - SENTRY_DSN=${SENTRY_DSN:-}
     - LOG_LEVEL=${LOG_LEVEL:-info}
     - CALCOM_LICENSE_KEY=${CALCOM_LICENSE_KEY:-}
     - API_KEY_PREFIX=${API_KEY_PREFIX:-cal_}
   ports:
     - "5555:80"
   depends_on:
     postgres:
       condition: service_healthy
     redis:
       condition: service_healthy
   healthcheck:
     test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
     interval: 30s
     timeout: 10s
     retries: 3
     start_period: 60s
   networks:
     - calcom_network


 # API v1 (Next.js)
 api-v1:
   build:
     context: .
     dockerfile: Dockerfile.api-v1
     args:
       NODE_ENV: production
       NEXT_PUBLIC_API_V2_ROOT_URL: http://api-v2:80
   image: appointly/api-v1:latest
   container_name: calcom_api_v1_prod
   restart: unless-stopped
   environment:
     - NODE_ENV=production
     - DATABASE_URL=postgresql://calcom:${POSTGRES_PASSWORD:-calcom_password}@postgres:5432/calcom
     - DATABASE_DIRECT_URL=postgresql://calcom:${POSTGRES_PASSWORD:-calcom_password}@postgres:5432/calcom
     - REDIS_URL=redis://redis:6379
     - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-your-secret-key-here}
     - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
     - NEXT_PUBLIC_WEBAPP_URL=${NEXT_PUBLIC_WEBAPP_URL:-http://localhost:3000}
     - NEXT_PUBLIC_API_V2_ROOT_URL=http://localhost:5555
     - BUILD_STANDALONE=true
     - PORT=3003
     - STRIPE_PRIVATE_KEY=${STRIPE_PRIVATE_KEY:-}
     - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
     - CALENDSO_ENCRYPTION_KEY=${CALENDSO_ENCRYPTION_KEY:-}
     - GOOGLE_API_CREDENTIALS=${GOOGLE_API_CREDENTIALS:-}
   ports:
     - "3003:3003"
   depends_on:
     postgres:
       condition: service_healthy
     redis:
       condition: service_healthy
     api-v2:
       condition: service_healthy
   healthcheck:
     test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3003/api/health"]
     interval: 30s
     timeout: 10s
     retries: 3
     start_period: 60s
   networks:
     - calcom_network


 # API Proxy
 api-proxy:
   build:
     context: .
     dockerfile: Dockerfile.api-proxy
   image: appointly/api-proxy:latest
   container_name: calcom_api_proxy_prod
   restart: unless-stopped
   environment:
     - NODE_ENV=production
     - API_V1_URL=http://api-v1:3003
     - API_V2_URL=http://api-v2:80
   ports:
     - "3002:3002"
   depends_on:
     api-v1:
       condition: service_healthy
     api-v2:
       condition: service_healthy
   healthcheck:
     test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
     interval: 30s
     timeout: 10s
     retries: 3
     start_period: 30s
   networks:
     - calcom_network


 # Web App (Next.js)
 web:
   build:
     context: .
     dockerfile: Dockerfile.web
     args:
       NODE_ENV: production
       NEXT_PUBLIC_API_V2_ROOT_URL: http://localhost:5555
       NEXT_PUBLIC_WEBAPP_URL: ${NEXT_PUBLIC_WEBAPP_URL:-http://localhost:3000}
       NEXT_PUBLIC_API_URL: http://localhost:3002
       BUILD_DATE: ${BUILD_DATE:- $(date +%Y-%m-%d_%H:%M:%S)}
   image: appointly/web:latest
   container_name: calcom_web_prod
   restart: unless-stopped
   environment:
     - NODE_ENV=production
     - DATABASE_URL=postgresql://calcom:${POSTGRES_PASSWORD:-calcom_password}@postgres:5432/calcom
     - DATABASE_DIRECT_URL=postgresql://calcom:${POSTGRES_PASSWORD:-calcom_password}@postgres:5432/calcom
     - REDIS_URL=redis://redis:6379
     - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-your-secret-key-here}
     - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
     - NEXT_PUBLIC_WEBAPP_URL=${NEXT_PUBLIC_WEBAPP_URL:-http://localhost:3000}
     - NEXT_PUBLIC_API_URL=http://localhost:3002
     - NEXT_PUBLIC_API_V2_ROOT_URL=http://localhost:5555
     - BUILD_STANDALONE=true
     - PORT=3000
     - STRIPE_PUBLIC_KEY=${NEXT_PUBLIC_STRIPE_PUBLIC_KEY:-}
     - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
     - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
     - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
     - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
     - EMAIL_SERVER_HOST=${EMAIL_SERVER_HOST:-}
     - EMAIL_SERVER_PORT=${EMAIL_SERVER_PORT:-}
     - EMAIL_FROM=${EMAIL_FROM:-}
     - CALCOM_TELEMETRY_DISABLED=1
     - NEXT_TELEMETRY_DISABLED=1
   ports:
     - "3000:3000"
   depends_on:
     postgres:
       condition: service_healthy
     redis:
       condition: service_healthy
     api-proxy:
       condition: service_healthy
   healthcheck:
     test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
     interval: 30s
     timeout: 10s
     retries: 3
     start_period: 90s
   networks:
     - calcom_network


 # Database migration and seeding service
 db-setup:
   build:
     context: .
     dockerfile: Dockerfile.db-setup
     args:
       DATABASE_URL: postgresql://calcom:${POSTGRES_PASSWORD:-calcom_password}@postgres:5432/calcom
       DATABASE_DIRECT_URL: postgresql://calcom:${POSTGRES_PASSWORD:-calcom_password}@postgres:5432/calcom
   image: appointly/db-setup:latest
   container_name: calcom_db_setup_prod
   environment:
     - DATABASE_URL=postgresql://calcom:${POSTGRES_PASSWORD:-calcom_password}@postgres:5432/calcom
     - DATABASE_DIRECT_URL=postgresql://calcom:${POSTGRES_PASSWORD:-calcom_password}@postgres:5432/calcom
     - NODE_ENV=production
   depends_on:
     postgres:
       condition: service_healthy
   networks:
     - calcom_network
   profiles:
     - setup


 # NGINX reverse proxy for production (optional)
 nginx:
   image: nginx:alpine
   container_name: calcom_nginx_prod
   restart: unless-stopped
   ports:
     - "80:80"
     - "443:443"
   volumes:
     - ./nginx.conf:/etc/nginx/nginx.conf:ro
     - ./ssl:/etc/ssl/certs:ro
   depends_on:
     web:
       condition: service_healthy
     api-proxy:
       condition: service_healthy
   networks:
     - calcom_network
   profiles:
     - nginx


volumes:
 postgres_data_prod:
   driver: local
 redis_data_prod:
   driver: local


networks:
 calcom_network:
   driver: bridge
   ipam:
     config:
       - subnet: 172.20.0.0/16






